name: backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: scc
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: scc
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: backend
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Lint
        working-directory: backend
        run: |
          ruff check app tests
      - name: Test
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://scc:dev@localhost:5432/scc
          REDIS_URL: redis://localhost:6379/0
        run: pytest -q

# Deployment is handled by Railway directly via its GitHub integration —
# Railway redeploys on every push to main. No deploy step needed here.
