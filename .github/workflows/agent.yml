name: agent

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "agent/**"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: agent
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Test
        working-directory: agent
        run: pytest -q
      - name: Build .exe
        working-directory: agent
        run: python build.py
      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: agent
        run: |
          mkdir release
          copy dist\scc-agent.exe release\
          copy installer\install.ps1 release\
          copy installer\uninstall.ps1 release\
          Compress-Archive -Path release\* -DestinationPath scc-agent-${{ github.ref_name }}.zip
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: agent/scc-agent-${{ github.ref_name }}.zip
